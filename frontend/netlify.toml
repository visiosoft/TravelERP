[build]
  # Build command to run
  command = "npm run build"
  # Directory to publish (Vite outputs to 'dist' by default)
  publish = "dist"

# Production environment variables
[build.environment]
  VITE_API_URL = "https://travelerp.mypaperlessoffice.org/api"

# Redirect all requests to index.html for client-side routing (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
