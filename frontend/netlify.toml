[build]
  # Build command to run
  command = "npm run build"
  # Directory to publish (Vite outputs to 'dist' by default)
  publish = "dist"

# Redirect all requests to index.html for client-side routing (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (set these in Netlify UI)
# VITE_API_URL - Your backend API URL
